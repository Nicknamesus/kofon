code: pwzq_heavy_duty_travel
name: PWZQ Heavy-Duty Travel Planetary Gearbox
family: Planetary gearbox
description: PWZQ series heavy-duty travel planetary gearboxes designed for high radial
  load applications. Features custom paired tapered roller bearings for strong radial
  load capacity, a ring gear made of medium-carbon alloy forged steel with nitriding
  surface treatment for high toughness, and low-carbon alloy forged steel carburized
  and ground gears for strength and longevity. An optional static brake can be integrated
  via the hydraulic system for parking braking. Available in 11 frame sizes (PWZQ250
  to PWZQ785) with various ratios and hydraulic motor compatibility.
