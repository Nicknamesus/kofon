code: k_r_series
name: K-R Series Hypoid Right-Angle Gearbox
family: Bevel gear
description: K-R series hypoid right-angle gearboxes from Kofon, featuring high precision
  (backlash ≤4 arcmin), high torque density, and compact right-angle design. Available
  in 1-stage and 2-stage configurations with ratios from 3:1 to 100:1. The KHR180
  frame uses high-strength tapered roller bearings for high overturning moment capacity,
  advanced grinding processes for efficiency and long life, and is compatible with
  any servo motor via customizable output dimensions.
