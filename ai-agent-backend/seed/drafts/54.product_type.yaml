code: rd_series
name: RD Series — Compact Multi-Axis Integrated Servo Drive
family: Servo drive
description: The RD Series is a compact multi-axis integrated servo drive from Kofon.
  It supports 2 to 6 servo axes in a single housing, reducing installation space by
  up to 30% compared to equivalent discrete configurations. Features include dynamic
  braking, vibration suppression, integrated safety functions, and a user-friendly
  tuning software with auto stiffness control and system parameter identification.
  Available in 220V and 380V variants with per-axis rated output currents from 2.0
  to 35.0 Arms.
