code: r080_series
name: R080 Series Precision Planetary Gearbox
family: Planetary gearbox
description: The R080 series precision planetary gearbox from Kofon is a compact,
  high-torque gearbox available in 1-stage, 2-stage, and 3-stage configurations. It
  offers ratios from 3:1 to 320:1, rated torques up to 90 Nm, and backlash as low
  as 8 arcmin (1-stage). Designed for general-purpose precision motion control applications
  with IP65 protection, grease lubrication, and a wide operating temperature range
  of -25°C to +90°C.
