# Notes: Single SKU page for the KR070-25 joint module. All specs were taken directly from the '技术参数' table. The page lists '峰值扭矩64Nm' in the description text but the table says 63.7 Nm — used the table value (63.7) as it's more precise. The 'Motor Size' is given as '70×78' (diameter × thickness in mm). The family is classified as 'Harmonic drive / strain wave' since it's a joint module with a reducer and dual encoder, typical of harmonic drive-based actuation modules. The datasheet PDF link is relative; the page URL is used as datasheet_url since the PDF filename is '伺服行星关节模组20250914.pdf' but no direct link was extractable.
code: kr070_25
name: KR070-25 Joint Module
family: Harmonic drive / strain wave
description: The KR070-25 is an integrated joint module featuring a dual-encoder closed-loop
  control system that eliminates transmission chain errors. It supports multiple control
  modes (force-position hybrid, servo position, servo velocity, current/torque) and
  includes adaptive control technology, high control bandwidth, and protection against
  over-temperature, over-voltage, and overload. The module has a 25:1 reduction ratio,
  a rated torque of 25.5 Nm, peak torque of 63.7 Nm, and weighs 1.367 kg. It communicates
  via EtherCAT and optionally includes a built-in drive.
