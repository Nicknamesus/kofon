code: kr095_23
name: KR095-23 Joint Module
family: Harmonic drive / strain wave
description: The KR095-23 is a joint actuator module integrating a harmonic drive
  reducer, servo motor, and dual encoders for closed-loop control, eliminating transmission
  chain errors. It supports multiple control modes (force-position hybrid, servo position,
  servo velocity, current/torque) and features adaptive control technology, high control
  bandwidth, and protections against over-temperature, over-voltage, and overload.
  The module has a 23:1 reduction ratio, 48 VDC rated voltage, and CAN communication
  at 1 Mbps. The built-in drive is optional.
