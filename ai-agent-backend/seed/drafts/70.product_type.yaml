# Notes: The page lists two distinct sub-families: KTFR1 (with FL1/FR1/FH/FC variants) and a second table with KT...L/R/H/C variants. The second table appears to be a different variant naming (L, R, H, C instead of FL1, FR1, FH, FC) with slightly different torque values and weights. I've focused on the first table (KTFR1 series with FL1/FR1/FH/FC) as the primary product line since the page title says "KTFR1系列". The second table may represent a different product line (KT...L/R/H/C) that could be a separate product type. Only ratio 1:1, 1-stage entries are included as a representative sample — the full expansion across all ratios (2, 2.5, 3, 4, 5, 7, 8, 9, 10, 16, 20, 25, 32, 40, 50, 80, 100) and stages (1, 2, 3) would produce hundreds of SKUs. The torque values for ratios 2-100 are listed in the table but I've only extracted ratio 1:1 as a proof of concept. The page also has a datasheet PDF link (2K系列精密行星减速机 (1).pdf) but the URL is relative. The model naming has some inconsistencies (e.g., KT170F1 vs KT170FL1 in the table). I used the most consistent pattern. Weight values for the second table (L/L1/H/C series) are listed separately at the bottom.
code: ktfr1_series
name: KTFR1 Series Planetary Gearbox
family: Planetary gearbox
description: KTFR1 series precision planetary gearboxes from Kofon. Features top-grade
  spiral bevel gears with optimized design for uniform tooth contact load and high
  torque output. Integrated aluminum alloy housing ensures maximum rigidity and corrosion
  resistance. Gears are made of high-strength carburized alloy steel ground to ISO
  Grade 6 precision. Available in frame sizes KT070 through KT240, with single, double,
  and triple stage configurations offering ratios from 1:1 to 100:1. Suitable for
  precision servo applications with low backlash and high efficiency.
