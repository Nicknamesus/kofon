code: pwzd
name: PWZD Series Planetary Gearbox
family: Planetary gearbox
description: PWZD series planetary gearboxes are heavy-duty drives designed for tunnel
  boring, pipe jacking, and other non-excavation construction machinery. They feature
  carburized and ground sun/planet gears, nitrided ring gears, a motor-direct input
  design, and German-standard internal spline outputs. The housing is ultra-compact
  for confined spaces, and the load capacity exceeds that of standard planetary gearboxes
  by over 20%.
