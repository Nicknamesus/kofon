code: k_r_series
name: K-R Series — Hypoid Right-Angle Gearbox
family: Bevel gear
description: Kofon K-R Series hypoid right-angle gearboxes combine high-precision
  hypoid gearing with a compact right-angle design. They feature backlash ≤4 arcmin,
  high torsional rigidity, and a patented筒式锁紧机构 (cartridge locking mechanism) or coupling
  input design for concentricity and zero-backlash input transmission. Available in
  1-stage and 2-stage configurations with ratios from 3:1 to 100:1, rated torques
  up to 95 Nm, and IP65 protection.
