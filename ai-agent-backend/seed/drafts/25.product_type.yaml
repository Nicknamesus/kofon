# Notes: The page is titled "W8微型减速机" (W8 Micro Gearbox). The technical parameters table only shows data for frame size 08 (the smallest) with ratios 4 (1-stage), 16 (2-stage), 64 (3-stage). The overview mentions frame sizes 08/10/12/16/19/22/26/32 and many more ratios (single: 3.9/5.3/6.6; double: 16/21/26/28/35; triple: 62/83/103/111/138/150/172/186/231; quadruple: 243/326/406/439/546/590/679/734/794/913/1135) but no per-size/per-ratio torque/power data is provided for those. I have only extracted the three SKUs for frame 08 that have complete spec data. The torque values are very small (0.01-0.06 Nm continuous) — these are micro gearboxes. The "最大连续扭矩 0.01Nm-9Nm" range in the overview suggests larger frames have higher torque, but no breakdown is given. The "转动性量 9cm" appears to be a typo for "转动惯量" (moment of inertia) with unit g·cm². The value 0.004 is listed for all stages. Weight is given in grams (2.6/3.3/3.8g) — converted to kg. The "空松平均回程问隙" is backlash (arcmin). The page also lists a PDF datasheet "4微型行星减速机-W系列.pdf".
code: w8_micro
name: W8 Micro Gearbox
family: Planetary gearbox
description: W8 micro planetary gearbox series from Kofon. Designed for low-speed,
  high-torque applications in small spaces such as humanoid robot joints and drones.
  Features hardened gear hobbing, integrated front-flange ring gear, high torque,
  impact resistance, low noise, and grease lubrication (maintenance-free). Available
  in frame sizes 08/10/12/16/19/22/26/32 with single, double, triple, and quadruple
  stage configurations.
