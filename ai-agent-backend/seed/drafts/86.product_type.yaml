code: k_r_series
name: K-R Series — Hypoid Right-Angle Gearbox
family: Bevel gear
description: The K-R Series is a range of high-precision hypoid right-angle gearboxes
  from Kofon. They feature backlash below 5 arcmin, advanced grinding on imported
  ultra-precision machines, case-hardened low-carbon alloy forged steel gears (HRC62),
  high-capacity tapered roller bearings, and a new lubrication system for extended
  life. The input uses a clamping or coupling design for concentricity and zero-backlash
  transmission at high speeds. Output dimensions can be customised to fit any servo
  motor.
