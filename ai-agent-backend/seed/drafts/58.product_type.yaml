code: r_series_rf060
name: RF060 Series Precision Planetary Gearbox
family: Planetary gearbox
description: The RF060 series precision planetary gearbox from Kofon is a compact,
  high-precision gearbox in the R-series family. Available in 1-stage, 2-stage, and
  3-stage configurations with ratios ranging from 3:1 to 320:1. Features include IP65
  protection, grease lubrication, low backlash (8-15 arcmin depending on stages),
  high efficiency (93-97%), and a rated input speed of 3000 rpm with max 6000 rpm.
  The frame size is 60 mm.
