code: pwzq_series
name: PWZQ Series
family: Planetary gearbox
description: Heavy-duty traveling planetary gearbox series PWZQ, designed for mobile/construction
  machinery applications. Features customized paired tapered roller bearings for high
  radial load capacity, a ring gear made of medium-carbon alloy steel with nitriding
  treatment for toughness, and internal static brakes actuated by the hydraulic system.
  Gears are carburized and ground from low-carbon alloy forged steel for strength
  and durability. Available in 11 frame sizes with various ratios and compatible hydraulic
  motor options.
