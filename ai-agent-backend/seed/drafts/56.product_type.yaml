# Notes: The page lists R060 in 1-stage (ratios 3/4/5/8/10), 2-stage (ratios 12/15/16/20/25/32/40), and 3-stage (ratios 64/80/100/125/160/200/256/320). Each ratio has its own torque values, so I expanded each into a separate SKU. The 2-stage table header says "速比 Ratio i" but the first column shows "1" which appears to be a column index, not a ratio — the actual ratios start from 12. Similarly for 3-stage the first column shows "1" then ratios 64-320. I used the torque values as listed per ratio. The page has some typos: "Emergency sotp torque", "Mouting Position", "Mouting Posiion", "kgcm2" (should be kg·cm²). I kept the values as-is. The radial/axial force labels appear swapped in the Chinese table (最大轴向力 = Max Axial Force, 最大径向力 = Max Radial Force) but the N values match the English labels shown, so I used the English labels as given. No datasheet or CAD URLs were available on the page.
code: r060_series
name: R060 Series
family: Planetary gearbox
description: The R060 series is a compact precision planetary gearbox from Kofon's
  R-series line, available in 1-stage, 2-stage, and 3-stage configurations. It offers
  ratios from 3:1 to 320:1, rated torques up to 35 Nm, backlash as low as 8 arcmin
  (1-stage), and IP65 protection. Suitable for general-purpose precision motion control
  applications.
