# Review before promoting to seed/product_types/kfdg_series.yaml
# Notes: The page is for KFDG series fold-back electric cylinders. The table header row is somewhat ambiguous — I interpreted columns as: Product series | Screw lead (mm) | Max thrust (kN) | Max speed (mm/s) | Screw input torque at max thrust (Nm) | Screw dynamic load rating (kN) | Max stroke (mm) | Weight per 100mm stroke (kg) | Power tube max rotation angle (°) | Axial backlash (mm) | 300mm lead error (mm) | Repeatability (mm). The '最大推力' column appears twice in the header — I used the first occurrence as the thrust column header and the second as the screw input torque column based on the values. The '导程' column is screw lead. The '丝杆额定动载' is screw dynamic load rating. The '最大行程' is max stroke. The '每100mm行程重量' is weight per 100mm stroke. The '动力管最大旋转角度' is power tube max rotation angle. The '轴向间隙' is axial backlash (given as a range). The '300mm导程误差' is 300mm lead error. The '重复精度' is repeatability. The '定位精度' (positioning accuracy) of 0.01mm is mentioned in the text description but not in the table — I omitted it from specs since it's not per-SKU. The SKU naming uses frame size + lead (no stage/ratio as this is a linear actuator, not a gearbox). The '最大速度' column values are in mm/s. The page also mentions a PDF datasheet link (6伺服电动缸.pdf) but no direct URL was extractable.
code: kfdg_series
name: KFDG Series — Fold-back Electric Cylinder
family: Linear actuator
description: KFDG series fold-back (reverse-parallel) electric cylinders from Kofon.
  These linear actuators use precision ball screws or planetary roller screws to convert
  rotary motion into linear motion with high efficiency (>90%). They offer thrust
  from 15 kg to 30 tons, stroke up to 1 m, speeds up to 2 m/s (with roller screw),
  and positioning accuracy of ~0.01 mm. Suitable for恶劣 environments with high strength,
  high speed, high precision, smooth and low-noise operation. Available in frame sizes
  50, 60, 70, 80, 100, and 120 mm.
