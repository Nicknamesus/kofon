name: KPX-S Series Hand-Input Reducer
family: Planetary gearbox
description: The KPX-S series is a hand-input (manual crank) planetary reducer designed
  for applications where electric power may be unavailable or unreliable. It allows
  manual operation during power failures or in remote areas, ensuring continued equipment
  functionality. The series features high reliability, simple operation, and a wide
  range of reduction ratios in both 1-stage and 2-stage configurations.
