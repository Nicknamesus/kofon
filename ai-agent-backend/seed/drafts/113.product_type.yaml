# Notes: 1. The page lists two backlash options: "标准≤3 / 精密≤6" for 1-stage and "标准≤5 / 精密≤8" for 2-stage. I stored both as a string since the schema has backlash_arcmin as string type. 2. For 1-stage, max radial force (F2AMax) value is missing from the page (shown as blank). Max axial force (F2QMax) is 1600 N. For 2-stage, max radial force is 3200 N and max axial force is 1600 N. 3. 1-stage efficiency, lubrication, weight, and service lifetime are not explicitly listed in the 1-stage table; I carried over the 2-stage values for service_lifetime_h (20000) and operating_temp_range_c since they appear to be common to the product family. Weight for 1-stage is not given. 4. The noise value for 2-stage had a typo "dB(A9" — interpreted as dB(A) ≤62. 5. "合成脂润滑" = synthetic grease lubrication. 6. "安装方式: 任意" = mounting position: any. 7. Rotational inertia values are given in kg·cm²; kept as-is (not converted to kg·m²). 8. The 1-stage table does not list efficiency, lubrication, weight, or service lifetime separately — these may be shared across the series but I only included them for 2-stage where explicitly stated.
