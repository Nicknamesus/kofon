name: KPX-S Series Hand-Crank Input Reducer
family: Planetary gearbox
description: The KPX-S series is a hand-crank input planetary gearbox designed for
  manual backup operation when electrical power is unavailable. It ensures equipment
  can continue running in remote areas or emergency situations. Available in 1-stage
  and 2-stage configurations with a wide range of ratios, offering high reliability,
  simple operation, and standard backlash options.
