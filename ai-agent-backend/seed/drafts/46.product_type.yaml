code: kofon_ball_screw
name: Kofon Precision Ball Screw
family: Roller screw
description: Kofon precision ball screw series. High-efficiency (≥90%) rolling-element
  linear actuator converting rotary to linear motion (or vice versa) with low friction,
  high positioning accuracy, high rigidity (via preload), high speed capability, and
  long service life. Available in multiple screw diameters (16–63 mm) and leads (4–10
  mm) with various ball diameters and circuit configurations.
