# Notes: The page lists backlash as ≤5 arcmin for both 1-stage and 2-stage, but the product features section says "侧隙低于4弧分" (backlash below 4 arcmin). I used the tabular value of ≤5 arcmin as the authoritative spec since it's per-model. The max tilting moment is listed as 251 N — the column header says "最大侧倾力矩 Max.Tilting Moment F₂QMax N" — the unit is N but the label says "moment" which should be Nm. I kept the value as 251 N as printed but flagged it. The rotational inertia values are in kg·cm² (as printed). The 2-stage table has a typo "Emergency sotp torque" — kept as-is. The 2-stage lubrication is "油脂润滑" (grease lubrication) vs 1-stage "油润滑" (oil lubrication). The max radial force and max tilting moment are single values shared across all ratios for each stage count. The 2-stage no-load torque values are all 0.2 Nm (some rows show 0.20).
