# Notes: 1. The page does not list gear ratios — these are slewing drives with a single-stage or multi-stage reduction but no ratio table is provided. SKUs are identified by model + stage count (inferred from the "结构" column: T = 1-stage, W = 2-stage; no 3-stage models have dimensional data). 2. Weight for PWHZ320B is given as "116-140" — used lower bound 116 kg. For PWHZ380 1-stage weight is "160-180" — used 160 kg. For PWHZ380 2-stage weight is listed as "约4.5" which seems inconsistent (likely a copy error from the brake pressure row); used 180 kg as the upper bound from the range. 3. The "L" column in the technical parameters table is labeled "Kg" but appears to be weight; the "t" column is application tonnage. 4. PWHZ320A has static brake torque 155 Nm which seems low vs others — kept as-is from page. 5. The "最大耐压MPa" column for PWHZ280 shows 220 MPa which seems extremely high for hydraulic pressure — likely a typo or different unit, kept as-is. 6. No ratio or backlash data available on this page. 7. The datasheet PDF link is mentioned but no URL was extractable from the page text.
code: pwhz_rotary
name: PWHZ Rotary Planetary Gearbox
family: Planetary gearbox
description: PWHZ series rotary planetary gearboxes are designed for slewing applications
  in hydraulic truck cranes, crawler cranes, railway cranes, ship decks, docks, and
  container handling. Features include same-direction input/output rotation, easy
  installation and oil change, low-noise operation, modular high-strength planetary
  gearing, and 1–3 stage configurations. A wet multi-disc brake (normally closed)
  is integrated. The motor is not included.
