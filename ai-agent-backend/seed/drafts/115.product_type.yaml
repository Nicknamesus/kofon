# Notes: 1. The 2-stage table header says "速比 Ratio i" then lists values starting from 12 (no ratio 1 listed — the "1" appears to be a column header artifact). I skipped ratio 1 for 2-stage as it doesn't make sense for a 2-stage gearbox. 2. The 2-stage table has 13 ratio columns but the torque rows have only 13 values; I matched them positionally. 3. The 2-stage table header row shows "1 12 15 16 20 25 30 32 35 40 45 50 60 64" — the "1" is likely a numbering artifact, so I started from 12. 4. Rotational inertia units are listed as kgcm² (1-stage) and kgcm (2-stage) — likely both are kg·cm²; I used kgcm2 as the key. 5. Backlash is given as a range (standard/precision) — stored as a string. 6. The page lists "最大轴向力 Max Radial Force F2AMax" and "最大径向力 Max Axial Force F2QMax" — the Chinese/English labels appear swapped; I preserved the English labels as written on the page. 7. No datasheet or CAD URLs available on this page. 8. The 2-stage table has a column for ratio 64 with torque values 510/918/1020 — these match the 1-stage ratio 8 values.
code: kpx_s_series_hand_crank
name: KPX-S Series Hand Crank Input Reducer
family: Planetary gearbox
description: The KPX-S series hand-crank input reducers from Kofon are designed for
  applications where manual backup operation is required. In the event of power failure
  or motor fault, the hand-crank mechanism allows continued equipment operation, making
  them ideal for remote sites or emergency scenarios. Available in 1-stage and 2-stage
  configurations with a wide range of ratios, offering high efficiency (up to 97%)
  and low backlash.
