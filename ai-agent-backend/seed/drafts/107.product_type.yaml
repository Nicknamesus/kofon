# Notes: This page covers only the KHR070 frame size within the K-R series (hypoid right-angle gearboxes). The product_type_code 'k_r_series' groups all K-R series SKUs; other frame sizes (e.g. KHR... others) would be added under the same product type. The page lists backlash as ≤5 arcmin for both 1-stage and 2-stage, but the feature description says "侧隙低于4弧分" (backlash below 4 arcmin) — the table says ≤5, so I used the table value. The max tilting moment is labeled "F₂QMax" with value 251 N — assuming this is Nm (Nm is typical for tilting moment). Rotational inertia values are given in kg·cm²; kept as-is. 2-stage lubrication is "油脂润滑" (grease lubrication) vs 1-stage "油润滑" (oil lubrication). Efficiency is 96% for 1-stage, 94% for 2-stage. The page mentions "准双曲面直角减速机K-R系列" (Hypoid right-angle gearbox K-R series) as the product category.
