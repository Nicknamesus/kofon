code: kgr_series
name: KGR Series
family: Bevel gear
description: KGR series hypoid right-angle gearboxes from Kofon. Available in 1-stage
  and 2-stage configurations with frame size 180. Features high precision (backlash
  ≤4 arcmin), high torque capacity, and high efficiency (up to 96% for 1-stage, 94%
  for 2-stage). Uses advanced case-hardened low-carbon alloy forged steel gears, precision
  grinding, and tapered roller bearings for high overturning moment capacity. Suitable
  for servo motor integration with customizable output dimensions.
