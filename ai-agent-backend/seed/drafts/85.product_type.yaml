# Notes: The page lists models 2S250, 2S300, 2S450, 2S600 with ratios 1, 4, 5. The motor center height for 2S450 is listed as "160/180" — I used 160 (the first value) as it matches the 2S300 pattern; reviewer may want to confirm. The backlash column shows two rows (30 and 20 arcmin) — from context, 30 arcmin applies to ratio i=1 (direct drive) and 20 arcmin applies to ratios 4 and 5. The output inertia is listed per ratio (1 vs 4) — I assigned 270/570 for 2S250/2S300 and 530/1100 for 2S450 and 850/1470 for 2S600; ratio 5 shares the same inertia as ratio 4 per the table layout. Max axial force is only listed for ratios 4/5 (column header "4/5"). Oil volume is given for horizontal (B5) mounting; vertical uses circulating oil lubrication. The page also mentions a datasheet PDF (双档减速机ZF-S系列 .pdf) but no direct URL was extractable.
code: zf_s_series
name: ZF-S Series
family: Planetary gearbox
description: ZF-S two-stage planetary gearbox series is a core drive element for machine
  tools. Depending on installation orientation, it can be adapted for lathes (horizontal
  B5) or vertical machining centers (vertical V1). It excels in low-speed, high-torque
  applications and also provides coaxial output performance suitable for high-speed
  operation.
