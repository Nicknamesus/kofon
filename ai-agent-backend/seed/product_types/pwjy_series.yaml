code: pwjy_series
name: PWJY Series
family: Planetary gearbox
description: PWJY series planetary gearboxes from Kofon, featuring an integrated planetary
  gear structure with high efficiency and stable performance. They include a high-strength
  alloy steel roller (surface can be rubber-coated), an efficient electromagnetic
  brake for direct braking of the power shaft, smart sensors for remote monitoring,
  and an integrated cast support frame. Designed for horizontal installation with
  industrial gear oil lubrication.
