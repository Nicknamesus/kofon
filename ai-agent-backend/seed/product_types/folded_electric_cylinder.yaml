code: folded_electric_cylinder
name: Folded electric cylinder
family: Planetary Roller Screw
description: >-
  Folded-configuration electric cylinder where the servo motor is mounted parallel to the screw via a belt/pulley, instead of coupled inline. Shortens overall length for installations where axial space is limited. Sister product to the inline KFDG direct-drive line.
product_page_url: https://www.kofon.com.cn/products_detail/44.html
