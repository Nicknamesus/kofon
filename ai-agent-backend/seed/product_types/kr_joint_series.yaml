# Split out from former kr_series.yaml. KR-series joint reducers and modules
# for robot joints — RV / Robot Reducer family. Integrated motor + planetary
# reducer in a single coaxial housing.
code: kr_joint_series
name: Robot joint reducer (KR)
family: RV / Robot Reducer
description: KR-series joint reducers and modules from Kofon for industrial and
  collaborative robot joints. Each unit integrates a high-torque-density planetary
  reducer with a servo motor (and optional driver, encoder, and brake) into a
  single coaxial assembly. Available in frame sizes 045–128 with standard reduction
  ratios of 19:1 through 30:1. The "module" variants add a built-in driver and
  dual encoder for plug-and-play robot integration.
product_page_url: https://www.kofon.com.cn/products_detail/1430473083887861760.html
