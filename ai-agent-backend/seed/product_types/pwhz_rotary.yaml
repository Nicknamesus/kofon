code: pwhz_rotary
name: PWHZ Rotary Planetary Gearbox
family: Planetary gearbox
description: PWHZ series rotary planetary gearboxes are designed for slewing applications
  in hydraulic truck cranes, crawler cranes, railway cranes, ship decks, docks, and
  container handling. Features include same-direction input/output rotation, easy
  installation and oil change, low-noise operation, modular high-strength planetary
  gearing, and 1–3 stage configurations. A wet multi-disc brake (normally closed)
  is integrated. The motor is not included.
