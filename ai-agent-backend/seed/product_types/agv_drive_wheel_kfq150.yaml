code: agv_drive_wheel_kfq150
name: AGV drive wheel (KFQ150)
family: AGV / AMR Drive Solution
description: Integrated AGV drive wheel combining a servo motor and high-precision
  gearmotor in a compact hub-motor design. Features a resin-rubber or polyurethane
  outer tire layer for high strength and wear resistance, a compact hub reducer structure,
  and a simple mounting bracket for easy positioning and improved drive precision.
  Optional matching driver available.
