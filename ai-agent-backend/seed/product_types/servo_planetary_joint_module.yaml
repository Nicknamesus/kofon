code: servo_planetary_joint_module
name: Servo planetary joint module
family: Servo Motor Solution
description: >-
  Servo planetary joint modules integrate a servo motor, planetary reducer, and (optionally) driver/encoder/brake into a single rotary unit. Sister to the servo_linear_joint_module line, but rotary output for revolute robot joints.
product_page_url: https://www.kofon.com.cn/products_list/43.html
spec_schema:
  max_thrust_n:
    type: integer
    label: Max thrust (N)
  max_speed_mm_s:
    type: number
    label: Max linear speed (mm/s)
  voltage_v_dc:
    type: number
    label: Voltage (V DC)
  lead_mm:
    type: number
    label: Lead (mm)
  stroke_mm:
    type: number
    label: Stroke (mm)
  weight_kg:
    type: number
    label: Weight (kg)
