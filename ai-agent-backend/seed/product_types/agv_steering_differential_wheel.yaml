code: agv_steering_differential_wheel
name: AGV Steering & Differential Wheel
family: Planetary gearbox
description: AGV steering and differential wheels from Kofon, featuring a planetary
  gear structure inside the wheel hub. The wheel core uses a planetary gearbox design,
  offering customizable speed ratios, compact structure, high reliability, and maintenance-free
  operation. The outer wheel layer uses resin rubber or polyurethane for high strength
  and wear resistance. The drive wheel integrates travel and steering units, with
  low-voltage servo motors (48V DC), optional encoders, and both electronic and mechanical
  limit switches for safe steering control.
