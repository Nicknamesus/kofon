code: kpx_sy_series
name: KPX-SY Series Hand-Input Gearbox
family: Planetary gearbox
description: The KPX-SY series is a hand-input (manual crank) planetary gearbox designed
  for applications where electric power is unavailable or unreliable. It provides
  a reliable mechanical backup in remote areas or emergency situations. Available
  in 1-stage and 2-stage configurations with a wide range of ratios, offering high
  efficiency, low backlash, and compact dimensions.
