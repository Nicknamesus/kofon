code: k_series
name: Precision planetary gearbox (K-series)
family: Precision Planetary Gearbox
description: >-
  K-series precision planetary gearboxes from Kofon, the workhorse line of the CaesarPlanetary brand. Variants include KPL, KPLF, KPLS, KPLN, KPX, KVX, KPH, KGP, PX, and PW, covering inline, flange, and shaft-output configurations across a wide range of frame sizes and ratios.
product_page_url: https://www.kofon.com.cn/products_list/8.html
