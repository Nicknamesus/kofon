code: tkz_series
name: Tightening tool gearbox (TKZ)
family: Precision Planetary Gearbox
description: TKZ series tightening gearboxes (拧紧机) integrate advanced wear-resistant
  materials with planetary gear trains for high-speed wear resistance and noise reduction.
  They feature customized gear profiles with tooth optimization for improved impact
  resistance, special bearings designed to withstand multi-directional loads under
  tightening shocks, and can accommodate built-in torque and displacement sensors
  for torque visualization. The output shaft uses high-strength special materials
  with appropriate heat treatment for enhanced impact resistance and wear resistance.
product_page_url: https://www.kofon.com.cn/products_list/58.html
