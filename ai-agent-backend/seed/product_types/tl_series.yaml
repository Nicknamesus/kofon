code: tl_series
name: Tightening tool gearbox (TL)
family: Precision Planetary Gearbox
description: TL offset-type tightening machine gearbox series. Integrates advanced
  wear-resistant materials with planetary gear trains for high-speed wear resistance
  and noise reduction. Features customized gear trains with profile modification and
  tooth optimization for improved impact resistance, special bearing designs to withstand
  multi-directional loads under tightening shocks, and optional built-in torque and
  displacement sensors for torque visualization. Output shaft uses high-strength special
  materials with heat treatment for impact and wear resistance.
