# Application contexts the chatbot can match a user's free-form
# description to.
#
# Generated by `python -m app.seed.generate_use_cases --apply` against
# the current catalog. Edit by hand if rationale/notes need refining;
# re-run to regenerate fits when product_types change.

- industry: Robotics
  application: Cobot joint actuation
  description: Compact collaborative-robot joints requiring low backlash, smooth torque
    output, and modest peak loads.
  notes: Frame size constrained by arm geometry; weight matters.
- industry: Robotics
  application: AGV / AMR wheel drive
  description: Mobile-robot drivetrain — moderate continuous torque, high duty cycle,
    sealed against shop-floor dust.
  notes: Side-load and shock resistance matter more than absolute precision.
- industry: Packaging
  application: Servo indexing table
  description: Rotary indexer driving a packaging dial — high peak torque per index,
    low backlash for repeatable station alignment.
  notes: Duty is intermittent; thermal budget is generous.
- industry: Machine tool
  application: Rotary axis (B/C)
  description: Auxiliary rotary axis on a CNC mill — very low backlash, high stiffness,
    minimal lost motion under reversing loads.
  notes: Precision is the dominant requirement.
- industry: Solar
  application: Heliostat / tracker drive
  description: Slow, high-torque azimuth/elevation drive holding a panel against wind
    loads. Long lifetime under outdoor conditions.
  notes: Self-locking behavior is a plus.
- industry: Aerospace ground support
  application: Antenna positioner
  description: Precision positioning of a directional antenna — low backlash, smooth
    velocity control at low speeds.
  notes: Outdoor environment; corrosion resistance helpful.
- industry: Robotics
  application: Humanoid robot joint
  description: Very compact, lightweight joint actuation for humanoid robots — high
    torque density in a small envelope, low speed, high impact resistance.
  notes: Frame size 08–32 mm; weight and noise critical.
- industry: Assembly
  application: Torque-controlled tightening / bolting
  description: Precision fastening of threaded joints in automotive or industrial
    assembly — high impact resistance, multi-directional loads, optional torque/displacement
    sensing.
  notes: High-speed cycling with shock loads; sensor feedback for quality traceability.
- industry: Machine tool
  application: Spindle drive (low-speed high-torque)
  description: Main spindle drive for lathes and vertical machining centers requiring
    high torque at low RPM, low noise, and high radial load capacity.
  notes: Shift-by-wire actuation for speed range change; helical gearing for quiet
    operation.
- industry: Material handling
  application: Tunnel boring / pipe jacking drive
  description: Heavy-duty rotary drive for tunnel boring and non-excavation construction
    machinery — extreme torque, confined space, motor-direct input.
  notes: Load capacity >20% above standard planetary gearboxes; ultra-compact housing.
- industry: Mobile machinery
  application: Crane slewing drive
  description: Slewing rotation for truck cranes, crawler cranes, and ship deck cranes
    — high torque, integrated wet multi-disc brake, low-noise operation.
  notes: Same-direction input/output; modular planetary stages; motor not included.
- industry: Robotics
  application: Linear joint / lifting axis
  description: Precision linear motion for robot lifting columns or vertical axes
    — high thrust, smooth motion, integrated servo control.
  notes: Thrust up to 30 kN; speeds up to 500 mm/s; harsh environment capable.
- industry: Logistics
  application: Steering & differential drive for AGV
  description: Integrated travel and steering wheel unit for automated guided vehicles
    — planetary gear inside hub, 48V DC servo, electronic and mechanical limit switches.
  notes: Compact structure, maintenance-free, customizable speed ratios.
- industry: Industrial automation
  application: Multi-axis servo system
  description: Coordinated multi-axis motion control for packaging, printing, or assembly
    lines — compact drive integration, vibration suppression, auto-tuning.
  notes: 2–6 axes in one housing; reduces cabinet space by 30%.
- industry: Energy
  application: Manual backup drive for remote equipment
  description: Hand-crank planetary reducer for valves, gates, or solar trackers in
    locations where electric power is unavailable or unreliable.
  notes: High efficiency (up to 97%); low backlash options; emergency/manual operation.
- industry: Aerospace / defense
  application: Drone / UAV actuator
  description: Micro gearbox for drone gimbal, flap, or propeller pitch actuation
    — very small frame size, high torque-to-weight, low noise.
  notes: Frame sizes 08–32 mm; grease-lubricated, maintenance-free.
