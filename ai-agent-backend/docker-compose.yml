# Local-dev Postgres for the Kofon chatbot backend.
# The image is `pgvector/pgvector:pg16` so the pgvector extension is preinstalled
# — we'll need it in Phase 4 (embeddings) and there's no cost to having it now.
#
# Usage:
#   docker compose up -d     # start
#   docker compose down      # stop (data persists)
#   docker compose down -v   # stop and wipe the volume

services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: kofon-chatbot-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-kofon}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-kofon_dev_password}
      POSTGRES_DB: ${POSTGRES_DB:-kofon_chatbot}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - kofon_pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-kofon} -d ${POSTGRES_DB:-kofon_chatbot}"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  kofon_pg_data:
